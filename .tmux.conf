##### ~/.tmux.conf #####

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -as terminal-features '*:hyperlinks'   # pass OSC 8 hyperlinks through to Ghostty
set -g mouse on
set -g extended-keys on

# --- Directory-based status bar color ---
# Uses #{pane_current_path} to track the frontmost process's cwd
set-hook -g pane-focus-in          'run-shell -b "~/.tmux/set-dir-background.sh \"#{pane_current_path}\""'
set-hook -g client-session-changed 'run-shell -b "~/.tmux/set-dir-background.sh \"#{pane_current_path}\""'
set-hook -g client-attached        'run-shell -b "~/.tmux/set-dir-background.sh \"#{pane_current_path}\""'

# --- Pane styling (no background override) ---
set -g pane-border-style fg=colour240,bg=default
set -g pane-active-border-style fg=colour250,bg=default

# --- Status bar (right aligned, no clock) ---
set -g status on
set -g status-style bg=default,fg=colour109
set -g status-interval 15

# Remove left side completely
set -g status-left ""

# Make sure there's enough space
set -g status-right-length 200

# Format:
# cwd | [index:]window | [session] | "host"
set -g status-right "#(~/.tmux/shorten-path.sh '#{pane_current_path}') #[fg=colour245]|#[fg=colour109] #{?#{e|>:#{session_windows},1},#I:,}#W #[fg=colour245]|#[fg=colour109] [#S] #[fg=colour245]|#[fg=colour109] \"#H\" "
# Hide window list (window info is already in status-right)
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# --- Messages ---
set -g message-style bg=default,fg=default
set -g message-command-style bg=default,fg=default

# --- Copy mode ---
setw -g mode-style bg=colour153,fg=colour16

# --- History ---
set -g history-limit 100000

# Trackpad scroll fix: horizontal scroll events (buttons 66/67) must be caught
# for ALL event types — rapid events trigger tmux's double/triple-click detection,
# generating SecondClick/DoubleClick/TripleClick variants that exit copy mode.
%hidden HSCROLL_NOP="select-pane -t ="
%hidden HSCROLL_COPY_NOP="send-keys -X clear-selection"
# Root table (outside copy mode)
bind-key -T root MouseDown6Pane      $HSCROLL_NOP
bind-key -T root MouseDown7Pane      $HSCROLL_NOP
bind-key -T root MouseUp6Pane        $HSCROLL_NOP
bind-key -T root MouseUp7Pane        $HSCROLL_NOP
bind-key -T root MouseDrag6Pane      $HSCROLL_NOP
bind-key -T root MouseDrag7Pane      $HSCROLL_NOP
bind-key -T root MouseDragEnd6Pane   $HSCROLL_NOP
bind-key -T root MouseDragEnd7Pane   $HSCROLL_NOP
bind-key -T root SecondClick6Pane    $HSCROLL_NOP
bind-key -T root SecondClick7Pane    $HSCROLL_NOP
bind-key -T root DoubleClick6Pane    $HSCROLL_NOP
bind-key -T root DoubleClick7Pane    $HSCROLL_NOP
bind-key -T root TripleClick6Pane    $HSCROLL_NOP
bind-key -T root TripleClick7Pane    $HSCROLL_NOP
# Copy mode (inside copy mode)
bind-key -T copy-mode-vi MouseDown6Pane      $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseDown7Pane      $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseUp6Pane        $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseUp7Pane        $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseDrag6Pane      $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseDrag7Pane      $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseDragEnd6Pane   $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi MouseDragEnd7Pane   $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi SecondClick6Pane    $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi SecondClick7Pane    $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi DoubleClick6Pane    $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi DoubleClick7Pane    $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi TripleClick6Pane    $HSCROLL_COPY_NOP
bind-key -T copy-mode-vi TripleClick7Pane    $HSCROLL_COPY_NOP
# Enter copy mode without -e: trackpad momentum generates WheelDown events that
# would auto-exit copy mode. Use q or Escape to exit instead.
bind-key -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode }

# Scroll 2 lines per wheel event (default is 5)
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down \; if-shell -F "#{==:#{scroll_position},0}" { send-keys -X cancel }

# Single-click drag selection: copy and exit if not scrolled, stay in copy mode if scrolled
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "tmux load-buffer -" \; if-shell -F "#{==:#{scroll_position},0}" { send-keys -X cancel } { send-keys -X clear-selection }
# Exit copy mode with Escape or q
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel

# --- Outer terminal window title (shown by Ghostty on the Mac) ---
# pane_current_path tracks the foreground process's cwd, so the title updates
# as we `cd` around without relying on the shell forwarding escapes.
set -g set-titles on
# Host label: bare hostname for the default user (ivan), else user@host. Decided
# once at load via run-shell so the shell can read $USER ($USER doesn't expand
# inside tmux #{} formats). #{E:} re-expands the stored value.
set -g @title_host "#H"
run-shell 'tmux set -g @title_host "$([ "$USER" = ivan ] && printf "#H" || printf "%s@#H" "$USER")"'
# Show the foreground command (e.g. vim, ssh, claude) before the cwd, but omit it
# for plain shells so the prompt just reads "[host] dir".
set -g set-titles-string "[#{E:@title_host}] #{?#{m/r:^-?(zsh|bash)$,#{pane_current_command}},,#{pane_current_command}: }#{s|^$HOME|~|:pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
