##### ~/.tmux.conf #####

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g mouse on

# --- Pane styling (no background override) ---
set -g pane-border-style fg=colour240,bg=default
set -g pane-active-border-style fg=colour250,bg=default

# --- Status bar (right aligned, no clock) ---
set -g status on
set -g status-style bg=default,fg=colour109
set -g status-interval 15

# Remove left side completely
set -g status-left ""

# Make sure there's enough space
set -g status-right-length 200

# Format:
# cwd | [index:]window | [session] | "host"
set -g status-right "#(~/.tmux/shorten-path.sh '#{pane_current_path}') #[fg=colour245]|#[fg=colour109] #{?#{e|>:#{session_windows},1},#I:,}#W #[fg=colour245]|#[fg=colour109] [#S] #[fg=colour245]|#[fg=colour109] \"#H\" "
# Window styling (no background overrides)
set -g window-status-style bg=default,fg=colour245
set -g window-status-current-style bg=default,fg=colour255

# --- Messages ---
set -g message-style bg=default,fg=default
set -g message-command-style bg=default,fg=default

# --- Copy mode ---
setw -g mode-style bg=colour153,fg=colour16

# --- History ---
set -g history-limit 100000

# Mouse-copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "tmux load-buffer -" \; send-keys -X clear-selection
# Exit copy mode when any key is pressed
bind-key -T copy-mode-vi -n Any send-keys -X cancel

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
